<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{page_layout/layout}">

<head>
    <meta charset="UTF-8">
    <title>Users Management</title>
</head>

<body>
    <div layout:fragment="main-content">
        <h1>Users Management</h1>

        <div th:if="${#lists.isEmpty(users)}" class="alert alert-info">
            No users found in the system.
        </div>

        <div th:if="${not #lists.isEmpty(users)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                            <span th:unless="${user.role == 'ADMIN'}" class="badge bg-secondary">USER</span>
                        </td>
                        <td>
                            <a th:href="@{'/admin/users/' + ${user.id}}" class="btn btn-primary btn-sm">View Details</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="/animal" class="btn btn-secondary mt-3">Back to Animals</a>
    </div>
</body>

</html>
